name: Scrape Kaitoriwiki Only (manual)

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Scrape kaitoriwiki
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python kaitoriwiki_scraper.py

      - name: Upload JSON snapshot
        uses: actions/upload-artifact@v4
        with:
          name: kaitoriwiki-${{ github.run_id }}
          path: output/kaitoriwiki_*.json
          retention-days: 30
