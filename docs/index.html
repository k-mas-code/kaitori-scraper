<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>買取価格チェッカー</title>
  <meta name="description" content="JANコードや商品名から、複数の買取店の最新買取価格を一括比較。">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💴</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/html5-qrcode" defer></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

  <header class="bg-white shadow-sm sticky top-0 z-20">
    <div class="max-w-3xl mx-auto px-4 py-3 flex items-center gap-2">
      <h1 class="text-lg font-bold text-slate-700 whitespace-nowrap">💴 買取価格チェッカー</h1>
      <span class="text-xs text-slate-400 hidden sm:inline">3買取店の最新価格を比較</span>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-4 py-4">

    <!-- 検索フォーム -->
    <section class="relative">
      <div class="flex gap-2">
        <div class="flex-1 relative">
          <input
            id="search-input"
            type="search"
            inputmode="search"
            autocomplete="off"
            placeholder="商品名 or JANコードで検索"
            class="w-full px-4 py-3 pr-10 rounded-lg border border-slate-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none text-base">
          <button
            id="clear-btn"
            type="button"
            class="absolute right-2 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-700 hidden"
            aria-label="クリア">
            ✕
          </button>
        </div>
        <button
          id="scan-btn"
          type="button"
          class="px-4 py-3 rounded-lg bg-blue-600 hover:bg-blue-700 text-white font-medium flex items-center gap-1 shrink-0"
          aria-label="バーコード読み取り">
          📷 <span class="hidden sm:inline">スキャン</span>
        </button>
      </div>

      <!-- 候補リスト -->
      <ul
        id="suggestions"
        class="absolute left-0 right-0 mt-1 bg-white rounded-lg shadow-lg border border-slate-200 max-h-96 overflow-y-auto hidden z-10">
      </ul>
    </section>

    <!-- ステータス表示 -->
    <div id="status" class="text-sm text-slate-500 py-3"></div>

    <!-- 検索結果ヒストリー -->
    <section id="result-area">
      <div id="result-toolbar" class="hidden flex items-center justify-between mb-3">
        <span id="history-count" class="text-sm text-slate-500"></span>
        <button id="clear-history-btn"
                class="text-sm text-red-600 hover:text-red-700 hover:underline">
          🗑 履歴を全削除
        </button>
      </div>

      <!-- 店舗別 合計買取額サマリー -->
      <div id="summary-card" class="hidden bg-white rounded-lg shadow mb-4 overflow-hidden">
        <div class="px-4 py-2 bg-emerald-600 text-white text-sm font-semibold">
          🏆 買取店ごとの合計買取額（高い順）
        </div>
        <table class="w-full text-sm">
          <thead class="bg-slate-100 text-slate-600 text-left">
            <tr>
              <th class="px-3 py-2 font-medium">買取店</th>
              <th class="px-3 py-2 font-medium text-center">対象点数</th>
              <th class="px-3 py-2 font-medium text-right">合計</th>
            </tr>
          </thead>
          <tbody id="summary-tbody" class="divide-y divide-slate-100"></tbody>
        </table>
      </div>

      <div id="result-list" class="space-y-4"></div>
    </section>

    <footer class="mt-10 text-xs text-slate-400 text-center">
      <p>データ更新は毎日12:00 JST。買取価格は最新のスナップショットで、実際の取引額は変動する可能性があります。</p>
    </footer>
  </main>

  <!-- スキャナモーダル -->
  <div id="scanner-modal" class="fixed inset-0 bg-black/80 z-30 flex flex-col items-center justify-center hidden">
    <div class="absolute top-4 right-4">
      <button id="scanner-close" class="text-white text-2xl px-3 py-1 rounded bg-black/40" aria-label="閉じる">✕</button>
    </div>
    <div class="text-white text-center mb-3 text-sm">
      JANコードのバーコードを枠内に映してください
    </div>
    <div id="reader" class="w-full max-w-md aspect-[4/3] bg-black"></div>
    <div id="scanner-error" class="text-red-300 text-sm mt-3 hidden"></div>
  </div>

  <script src="config.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
