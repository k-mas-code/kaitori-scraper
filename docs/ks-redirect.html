<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex,nofollow">
  <title>買取商店の検索結果へ移動中…</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 2em; color: #475569; background: #f8fafc; text-align: center; }
    .spinner { display: inline-block; width: 32px; height: 32px; border: 4px solid #cbd5e1; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    a { color: #2563eb; }
  </style>
</head>
<body>
  <p><span class="spinner"></span></p>
  <p>買取商店 (kaitorishouten-co.jp) の検索結果へ移動しています…</p>
  <noscript>
    <p>JavaScript が無効です。<a href="https://www.kaitorishouten-co.jp/">買取商店トップ</a>を開いて手動で JAN を貼り付けて検索してください。</p>
  </noscript>

  <form id="ks-form" method="POST"
        action="https://www.kaitorishouten-co.jp/products/list/keyword">
    <input type="hidden" name="page_type" value="1">
    <input type="hidden" name="name" id="jan-field">
  </form>

  <script>
    (function () {
      const params = new URLSearchParams(location.search);
      const jan = (params.get('jan') || '').trim();
      if (!/^\d{8,14}$/.test(jan)) {
        document.body.innerHTML =
          '<p>JAN が指定されていません。<a href="./">トップに戻る</a></p>';
        return;
      }
      document.getElementById('jan-field').value = jan;
      document.getElementById('ks-form').submit();
    })();
  </script>
</body>
</html>
