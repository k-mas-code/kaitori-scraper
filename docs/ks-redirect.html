<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex,nofollow">
  <title>買取商店トップへ移動中…</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 2em; color: #475569; background: #f8fafc; text-align: center; max-width: 480px; margin: 0 auto; }
    .spinner { display: inline-block; width: 32px; height: 32px; border: 4px solid #cbd5e1; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    a.btn { display: inline-block; margin-top: 1em; padding: .6em 1.2em; background: #2563eb; color: #fff; border-radius: 6px; text-decoration: none; }
    a.btn:hover { background: #1d4ed8; }
    .jan { font-family: ui-monospace, monospace; font-size: 1.4em; font-weight: bold; padding: .2em .5em; background: #e0f2fe; color: #075985; border-radius: 4px; }
    .copied { color: #059669; }
  </style>
</head>
<body>
  <div id="state">
    <p><span class="spinner"></span></p>
    <p>JANをコピー中…</p>
  </div>

  <noscript>
    <p>JavaScript が無効です。<a href="https://www.kaitorishouten-co.jp/">買取商店トップ</a>へ移動して手動で検索してください。</p>
  </noscript>

  <script>
    const KS_TOP = 'https://www.kaitorishouten-co.jp/';
    const REDIRECT_DELAY_MS = 1800;

    const $state = document.getElementById('state');
    const params = new URLSearchParams(location.search);
    const jan = (params.get('jan') || '').trim();

    if (!/^\d{8,14}$/.test(jan)) {
      $state.innerHTML = '<p>JAN が指定されていません。<a href="./">トップに戻る</a></p>';
    } else {
      copyAndRedirect(jan);
    }

    async function copyAndRedirect(jan) {
      let copied = false;
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(jan);
          copied = true;
        } else {
          copied = legacyCopy(jan);
        }
      } catch (e) {
        copied = legacyCopy(jan);
      }

      if (copied) {
        $state.innerHTML = `
          <p class="copied">✓ JAN <span class="jan">${escapeHtml(jan)}</span> をコピーしました</p>
          <p>買取商店トップに移動します。検索ボックスにペースト (Ctrl/Cmd + V) して検索してください。</p>
          <a class="btn" href="${KS_TOP}">買取商店トップへ進む →</a>
        `;
        setTimeout(() => location.replace(KS_TOP), REDIRECT_DELAY_MS);
      } else {
        $state.innerHTML = `
          <p>このJANを手動でコピーしてください:</p>
          <p><span class="jan">${escapeHtml(jan)}</span></p>
          <a class="btn" href="${KS_TOP}">買取商店トップへ進む →</a>
        `;
      }
    }

    function legacyCopy(text) {
      try {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.setAttribute('readonly', '');
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        const ok = document.execCommand('copy');
        ta.remove();
        return ok;
      } catch {
        return false;
      }
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }
  </script>
</body>
</html>
